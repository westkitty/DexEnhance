<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DexEnhance Live Render</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --ink: #0f1720;
      --muted: #4b5563;
      --panel: #ffffff;
      --line: #d9dee5;
      --accent: #0d6efd;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 18% -10%, #e5f1ff, transparent 45%), var(--bg);
      color: var(--ink);
      font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .title {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .meta {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    main {
      padding: 10px;
      min-height: 0;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 70px);
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }

    .error {
      color: #b42318;
      font-weight: 600;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      min-height: 32px;
      padding: 0 10px;
      cursor: pointer;
    }

    button:hover {
      border-color: color-mix(in srgb, var(--accent) 45%, var(--line));
    }
  </style>
</head>
<body>
  <header>
    <div>
      <p class="title">DexEnhance Live Render</p>
      <p id="meta" class="meta">Waiting for canvas session...</p>
    </div>
    <div>
      <span id="status" class="status">Booting...</span>
      <button id="reload" type="button">Reload Preview</button>
    </div>
  </header>
  <main>
    <iframe id="render-frame" sandbox="allow-scripts" referrerpolicy="no-referrer"></iframe>
  </main>
  <script type="module" src="./canvas.js"></script>
</body>
</html>
